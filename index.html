<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Willekeurige Vraag</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        padding: 20px;
        text-align: center;
    }
    #question {
        font-size: 1.6rem;
        margin-bottom: 30px;
        max-width: 600px;
    }
    button {
        padding: 15px 25px;
        font-size: 1.2rem;
        border: none;
        border-radius: 8px;
        background: #0078ff;
        color: white;
        cursor: pointer;
    }
    button:hover {
        background: #005fcc;
    }
</style>
</head>
<body>

<h2>Vraag</h2>
<div id="question">Klik op de knop voor een vraag</div>
<button onclick="showRandomQuestion()">Nieuwe vraag</button>

}

</body>
</html>
