<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vragen</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        label, select, button {
            font-size: 18px;
            margin: 10px 0;
            display: block;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Punten toevoegen</h1>

    <label for="team">Kies een ploeg:</label>
    <select id="team">
        <option value="1">Ploeg 1</option>
        <option value="2">Ploeg 2</option>
        <option value="3">Ploeg 3</option>
        <option value="4">Ploeg 4</option>
        <option value="5">Ploeg 5</option>
        <option value="6">Ploeg 6</option>
        <option value="7">Ploeg 7</option>
        <option value="8">Ploeg 8</option>
    </select>

    <label for="points">Kies punten:</label>
    <select id="points">
        <option value="1">1 punt</option>
        <option value="2">2 punten</option>
        <option value="3">3 punten</option>
        <option value="4">4 punten</option>
        <option value="5">5 punten</option>
        <option value="10">10 punten</option>
    </select>

    <button onclick="sendPoints()">Opslaan</button>

    <p id="status"></p>

<script>
async function updateScore(team, points) {
    try {
        const response = await fetch(
            "https://script.google.com/macros/s/AKfycbxujfgLMNJeKobnHAIDcFevwsSv-zxwtirCAbsh2AVHvKEyuUIzRgVEMQK9HH1B0_-aqQ/exec",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    team: Number(team),
                    punten: Number(points)
                })
            }
        );

        const data = await response.json();
        console.log("API response:", data);
        return data;

    } catch (error) {
        console.error("Fout bij API:", error);
        return { status: "error", message: "Netwerkfout" };
    }
}

async function sendPoints() {
    const team = document.getElementById("team").value;
    const points = document.getElementById("points").value;

    document.getElementById("status").innerText = "Bezig met opslaan...";

    const result = await updateScore(team, points);

    if (result.status === "ok") {
        document.getElementById("status").innerText =
            "Punten opgeslagen! Nieuwe score: " + result.newScore;
    } else {
        document.getElementById("status").innerText =
            "Fout: " + result.message;
    }
}
</script>

</body>
</html>
