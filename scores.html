<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorebord</title>
<style>
body { font-family: Arial; max-width: 600px; margin: 20px auto; text-align: center; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { padding: 10px; border-bottom: 1px solid #ccc; }
th { background: #f0f0f0; }
</style>
</head>
<body>

<h2>Live Scorebord</h2>

<table>
<thead>
<tr><th>Ploeg</th><th>Punten</th></tr>
</thead>
<tbody id="scores"></tbody>
</table>

<script>
const SHEET_ID = "1VlxKeOuqBrPIv5M5TRm6nOZ2kMY-1gicyA6akJUevDo";

async function loadScores() {
  const data = await fetch(`https://opensheet.elk.sh/${SHEET_ID}/scores`).then(r => r.json());

  // punten als getal sorteren
  data.sort((a, b) => Number(b.punten) - Number(a.punten));

  document.getElementById("scores").innerHTML = data.map(r =>
    `<tr><td>${r.ploeg}</td><td>${r.punten}</td></tr>`
  ).join("");
}

loadScores();
setInterval(loadScores, 5000);
</script>

</body>
</html>
